# Revela photo editor — append this location block to the graindays-staging Nginx vhost
# File: /etc/nginx/sites-available/graindays-staging (追記)

    location /edit/ {
        proxy_pass         http://127.0.0.1:3001/edit/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/ {
        proxy_pass http://127.0.0.1:3001/_next/;
    }
