name: Build Check (Revela)
# Staging deployment is handled by gdp-uno/graindays CI which has VPS SSH access.
# This workflow only verifies the build passes on every push.

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (basePath=/edit)
        run: npm run build
        env:
          DEPLOY_TARGET: staging
